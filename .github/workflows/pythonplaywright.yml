
name: CI

on:
   push:
    branches:
    - main  
   pull_request:
    branches:
    - master
  
jobs:
  build:
      runs-on: ubuntu-latest
      timeout-minutes: 30
      
      steps:
         - uses: actions/checkout@3
      
         - name: Set up Python 3.14
           uses: actions/setup-python@3
           with:
               python-version: "3.14"
           
         - name: Install dependies
           run: |
              pip install -r requirements.txt
              
         - name: Run tests
           run: pytest
           
